<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 福岡購物助手 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'kawaii-pink': '#FFD1DC',
                        'kawaii-blue': '#B2EBF2',
                        'kawaii-yellow': '#FFF9C4',
                        'kawaii-text': '#5D4037',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Nunito', sans-serif; color: #5D4037; }
        .kawaii-bounce { animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: none; } }
        .line-through-dim { text-decoration: line-through; opacity: 0.5; color: #9E9E9E; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="checkbox"] { appearance: none; cursor: pointer; position: relative; }
        input[type="checkbox"]::before { content: "🤍"; font-size: 1.5rem; position: absolute; left: -5px; top: -5px; }
        input[type="checkbox"]:checked::before { content: "💖"; }
    </style>
</head>
<body class="bg-kawaii-yellow/30 min-h-screen pb-32">
    <div id="app" class="max-w-md mx-auto">
        
        <div v-if="loading" class="fixed inset-0 bg-white/80 flex flex-col items-center justify-center z-50">
            <div class="text-7xl mb-6 kawaii-bounce">✈️</div>
            <div class="text-xl font-bold">正在整理福岡清單...</div>
        </div>

        <div v-else>
            <div class="sticky top-0 bg-white/95 shadow-sm z-10 rounded-b-2xl backdrop-blur-sm border-b border-kawaii-pink/50 p-3">
                <div class="flex justify-between items-center mb-3 px-1">
                    <h1 class="text-xl font-bold">🌸 福岡購物 🌸</h1>
                    <button @click="showAddModal = true" class="bg-kawaii-blue px-4 py-1.5 rounded-full text-xs font-bold shadow-sm hover:scale-105 transition">＋新增項目</button>
                </div>
                
                <div class="flex overflow-x-auto gap-2 mb-3 no-scrollbar">
                    <button v-for="store in stores" :key="store.storeId"
                        @click="selectedStoreId = store.storeId"
                        :class="['px-5 py-2.5 rounded-full whitespace-nowrap text-sm font-semibold transition', 
                                selectedStoreId === store.storeId ? 'bg-kawaii-blue text-white shadow-md scale-105' : 'bg-gray-100 text-gray-400']">
                        🛍️ {{ store.storeName }}
                    </button>
                </div>

                <div v-if="currentStore" class="mx-1 mb-3 p-3 bg-kawaii-yellow/60 rounded-xl border border-dashed border-kawaii-pink text-xs space-y-1">
                    <p class="flex items-start gap-1">
                        <span>📍</span> 
                        <span class="flex-1">{{ currentStore.address }}</span>
                    </p>
                    <div class="flex justify-between font-semibold text-kawaii-text/70 pt-1 border-t border-kawaii-pink/30">
                        <p>⏰ {{ currentStore.openingHours }}</p>
                        <p class="text-blue-500">🕒 預計：{{ currentStore.visitTime }}</p>
                    </div>
                </div>

                <div class="flex bg-gray-50 rounded-xl p-1 mx-1">
                    <button v-for="f in ['All', 'To Buy', 'Done']" :key="f"
                        @click="filter = f"
                        :class="['flex-1 py-1.5 text-sm font-bold rounded-lg transition-all', filter === f ? 'bg-white text-kawaii-text shadow-sm' : 'text-gray-400']">
                        {{ f === 'All' ? '全部' : f === 'To Buy' ? '未買' : '已買' }}
                    </button>
                </div>
            </div>

            <div class="p-4 space-y-4">
                <div v-for="item in filteredItems" :key="item.itemId" 
                    class="flex items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100 active:bg-gray-50 transition">
                    <img :src="item.imageUrl || 'https://via.placeholder.com/60?text=No+Photo'" class="w-16 h-16 object-cover rounded-xl mr-4 border border-kawaii-pink/20 shadow-inner" @error="$event.target.src='https://via.placeholder.com/60?text=No+Photo'">
                    <div class="flex-1">
                        <h3 :class="['font-bold text-base', item.isChecked ? 'line-through-dim' : 'text-kawaii-text']">{{ item.itemName }}</h3>
                    </div>
                    <input type="checkbox" v-model="item.isChecked" @change="addPending(item)" class="w-7 h-7">
                </div>
                <div v-if="filteredItems.length === 0" class="text-center py-10 text-gray-400 text-sm">
                    呢度暫時冇嘢喎～🌸
                </div>
            </div>

            <div v-if="showAddModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end z-50" @click.self="showAddModal = false">
                <div class="bg-white w-full rounded-t-3xl p-6 shadow-2xl animate-slide-up">
                    <div class="flex justify-between mb-5">
                        <h2 class="text-xl font-bold">📸 影張相記低佢</h2>
                        <button @click="showAddModal = false" class="text-gray-300 text-3xl">&times;</button>
                    </div>

                    <div class="space-y-4">
                        <div class="flex items-center gap-4 border-2 border-dashed border-kawaii-blue/50 p-4 rounded-2xl bg-kawaii-blue/5">
                            <div v-if="newItem.imageUrl" class="relative">
                                <img :src="newItem.imageUrl" class="w-24 h-24 object-cover rounded-xl shadow-md">
                                <button @click="newItem.imageUrl = ''" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs shadow-lg">✕</button>
                            </div>
                            <label v-else class="flex flex-col items-center justify-center w-24 h-24 bg-white rounded-xl cursor-pointer hover:bg-gray-50 border border-gray-100 shadow-sm transition">
                                <span class="text-3xl">📷</span>
                                <span class="text-[10px] mt-1 font-bold text-gray-400 uppercase tracking-wider">Upload</span>
                                <input type="file" accept="image/*" class="hidden" @change="uploadToCloudinary">
                            </label>
                            <div class="flex-1">
                                <p class="font-bold text-gray-700 text-sm">商品實拍</p>
                                <p class="text-xs mt-1" :class="isUploading ? 'text-blue-500 kawaii-bounce' : 'text-gray-400'">{{ uploadStatus }}</p>
                            </div>
                        </div>

                        <input v-model="newItem.itemName" type="text" placeholder="想買啲咩？" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 ring-kawaii-blue font-bold">
                        
                        <div>
                            <p class="mb-2 ml-1 text-xs font-bold text-gray-400 uppercase tracking-widest">Store Location</p>
                            <select v-model="newItem.storeId" class="w-full p-4 bg-gray-100 rounded-2xl outline-none font-semibold">
                                <option v-for="s in stores" :key="s.storeId" :value="s.storeId">{{ s.storeName }}</option>
                            </select>
                        </div>

                        <button @click="addNewItemToSheet" :disabled="isUploading || !newItem.itemName" 
                            class="w-full py-4 bg-kawaii-blue rounded-2xl font-bold text-kawaii-text shadow-lg active:scale-95 transition disabled:bg-gray-200 disabled:shadow-none">
                            加入清單 ✨
                        </button>
                    </div>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 right-0 p-4 pb-10 bg-white/90 border-t border-gray-100 max-w-md mx-auto shadow-2xl backdrop-blur-md rounded-t-3xl">
                <button @click="handleSync" :disabled="pendingCount === 0 || saving"
                    :class="['w-full py-4 rounded-2xl font-bold text-white shadow-lg transition-all', 
                            pendingCount === 0 ? 'bg-gray-300' : 'bg-kawaii-pink active:scale-95 hover:shadow-pink-200']">
                    <span v-if="saving" class="inline-block animate-spin mr-2">⏳</span>
                    {{ saving ? '正在同步...' : `儲存進度 (x${pendingCount}) ✨` }}
                </button>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbxP6Au0rO-gKhlh2hscTf9CCoNLJWC-ZY3zmtX4JlXzQbi5tVA5Uwk6JDn7lYy4d6P2/exec";
        const CLD_CLOUD_NAME = "disr3dmsj";
        const CLD_PRESET = "uploadurls";

        createApp({
            setup() {
                const stores = ref([]);
                const allItems = ref([]);
                const selectedStoreId = ref(null);
                const filter = ref('All');
                const pendingChanges = ref({});
                const loading = ref(true);
                const saving = ref(false);
                const showAddModal = ref(false);
                const isUploading = ref(false);
                const uploadStatus = ref('未選擇圖片');
                const newItem = ref({ itemName: '', storeId: '', imageUrl: '' });

                const fetchData = async () => {
                    try {
                        const res = await fetch(GAS_URL);
                        const data = await res.json();
                        stores.value = data.stores;
                        allItems.value = data.items.map(item => ({
                            ...item,
                            isChecked: String(item.isChecked).toUpperCase() === 'TRUE'
                        }));
                        if (stores.value.length > 0) {
                            selectedStoreId.value = stores.value[0].storeId;
                            newItem.value.storeId = stores.value[0].storeId;
                        }
                    } catch (e) { alert("讀取清單失敗，請檢查網路！"); }
                    loading.value = false;
                };

                const uploadToCloudinary = async (event) => {
                    const file = event.target.files[0];
                    if (!file) return;
                    isUploading.value = true;
                    uploadStatus.value = '傳送中...';
                    const fd = new FormData();
                    fd.append('file', file);
                    fd.append('upload_preset', CLD_PRESET);
                    try {
                        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
                        const data = await res.json();
                        newItem.value.imageUrl = data.secure_url;
                        uploadStatus.value = '✅ 搞掂！';
                    } catch (e) { uploadStatus.value = '❌ 出錯咗'; }
                    finally { isUploading.value = false; }
                };

                const addNewItemToSheet = async () => {
                    saving.value = true;
                    const payload = { action: 'addItem', ...newItem.value, itemId: Date.now().toString() };
                    try {
                        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                        alert("已加入 Sheets！記得重新整理網頁。");
                        showAddModal.value = false;
                        newItem.value = { itemName: '', storeId: selectedStoreId.value, imageUrl: '' };
                    } catch (e) { alert("新增失敗"); }
                    saving.value = false;
                };

                const currentStore = computed(() => stores.value.find(s => s.storeId === selectedStoreId.value));
                const filteredItems = computed(() => {
                    return allItems.value.filter(item => {
                        if (item.storeId !== selectedStoreId.value) return false;
                        if (filter.value === 'To Buy') return !item.isChecked;
                        if (filter.value === 'Done') return item.isChecked;
                        return true;
                    });
                });

                const addPending = (item) => { pendingChanges.value[item.itemId] = item.isChecked; };
                const pendingCount = computed(() => Object.keys(pendingChanges.value).length);
                const handleSync = async () => {
                    saving.value = true;
                    const payload = Object.keys(pendingChanges.value).map(id => ({ itemId: id, isChecked: pendingChanges.value[id] }));
                    try {
                        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                        alert("同步成功！🌸");
                        pendingChanges.value = {};
                    } catch (e) { alert("儲存失敗"); }
                    saving.value = false;
                };

                onMounted(fetchData);
                return { stores, allItems, selectedStoreId, filter, loading, saving, currentStore, filteredItems, addPending, pendingCount, handleSync, showAddModal, newItem, uploadToCloudinary, isUploading, uploadStatus, addNewItemToSheet };
            }
        }).mount('#app');
    </script>
</body>
</html>
