<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 福岡購物助手 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'kawaii-pink': '#FFD1DC',
                        'kawaii-blue': '#B2EBF2',
                        'kawaii-yellow': '#FFF9C4',
                        'kawaii-text': '#5D4037',
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Nunito', sans-serif; color: #5D4037; }
        .kawaii-bounce { animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: none; } }
        .line-through-dim { text-decoration: line-through; opacity: 0.5; color: #9E9E9E; }
        input[type="checkbox"] { appearance: none; cursor: pointer; position: relative; }
        input[type="checkbox"]::before { content: "🤍"; font-size: 1.5rem; position: absolute; left: -5px; top: -5px; }
        input[type="checkbox"]:checked::before { content: "💖"; }
    </style>
</head>
<body class="bg-kawaii-yellow/30 min-h-screen pb-32">
    <div id="app" class="max-w-md mx-auto">
        
        <div v-if="loading" class="fixed inset-0 bg-white/80 flex flex-col items-center justify-center z-50">
            <div class="text-7xl mb-6 kawaii-bounce">✈️</div>
            <div class="text-xl font-bold">讀取中...</div>
        </div>

        <div v-else>
            <div class="sticky top-0 bg-white/95 shadow-sm z-10 rounded-b-2xl backdrop-blur-sm border-b border-kawaii-pink/50 p-3">
                <div class="flex justify-between items-center mb-3">
                    <h1 class="text-xl font-bold">🌸 福岡購物助手</h1>
                    <button @click="showAddModal = true" class="bg-kawaii-blue px-3 py-1 rounded-full text-sm font-bold shadow-sm">＋新增</button>
                </div>
                
                <div class="flex overflow-x-auto gap-2 mb-3 no-scrollbar">
                    <button v-for="store in stores" :key="store.storeId"
                        @click="selectedStoreId = store.storeId"
                        :class="['px-5 py-2 rounded-full whitespace-nowrap text-sm font-semibold transition', 
                                selectedStoreId === store.storeId ? 'bg-kawaii-blue text-white shadow-md' : 'bg-gray-100 text-gray-400']">
                        🛍️ {{ store.storeName }}
                    </button>
                </div>

                <div class="flex bg-gray-50 rounded-lg p-1">
                    <button v-for="f in ['All', 'To Buy', 'Done']" :key="f"
                        @click="filter = f"
                        :class="['flex-1 py-1 text-sm font-bold rounded-md', filter === f ? 'bg-white shadow-sm' : 'text-gray-400']">
                        {{ f === 'All' ? '全部' : f === 'To Buy' ? '未買' : '已買' }}
                    </button>
                </div>
            </div>

            <div class="p-4 space-y-4">
                <div v-for="item in filteredItems" :key="item.itemId" 
                    class="flex items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <img :src="item.imageUrl || 'https://via.placeholder.com/60'" class="w-16 h-16 object-cover rounded-xl mr-4 border border-kawaii-pink/20">
                    <div class="flex-1">
                        <h3 :class="['font-bold', item.isChecked ? 'line-through-dim' : '']">{{ item.itemName }}</h3>
                    </div>
                    <input type="checkbox" v-model="item.isChecked" @change="addPending(item)" class="w-7 h-7">
                </div>
            </div>

            <div v-if="showAddModal" class="fixed inset-0 bg-black/50 flex items-end z-50">
                <div class="bg-white w-full rounded-t-3xl p-6 shadow-2xl animate-slide-up">
                    <div class="flex justify-between mb-4">
                        <h2 class="text-xl font-bold text-kawaii-text">📸 新增想要的東西</h2>
                        <button @click="showAddModal = false" class="text-gray-400 text-2xl">×</button>
                    </div>

                    <div class="space-y-4 text-sm">
                        <div class="flex items-center gap-4 border-2 border-dashed border-gray-200 p-4 rounded-xl">
                            <div v-if="newItem.imageUrl" class="relative">
                                <img :src="newItem.imageUrl" class="w-20 h-20 object-cover rounded-lg">
                                <button @click="newItem.imageUrl = ''" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs">×</button>
                            </div>
                            <label v-else class="flex flex-col items-center justify-center w-20 h-20 bg-gray-50 rounded-lg cursor-pointer hover:bg-kawaii-blue/20 transition">
                                <span class="text-2xl">📷</span>
                                <span class="text-[10px] text-gray-500">影相/揀相</span>
                                <input type="file" accept="image/*" class="hidden" @change="uploadToCloudinary">
                            </label>
                            <div class="flex-1">
                                <p class="font-bold text-gray-600">商品相片</p>
                                <p class="text-[10px] text-gray-400">{{ uploadStatus }}</p>
                            </div>
                        </div>

                        <input v-model="newItem.itemName" type="text" placeholder="輸入商品名稱 (例如: 合利他命)" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 ring-kawaii-blue">
                        
                        <div>
                            <p class="mb-1 ml-1 font-bold text-gray-500">放入店舖：</p>
                            <select v-model="newItem.storeId" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                                <option v-for="s in stores" :key="s.storeId" :value="s.storeId">{{ s.storeName }}</option>
                            </select>
                        </div>

                        <button @click="addNewItemToSheet" :disabled="isUploading || !newItem.itemName" 
                            class="w-full py-4 bg-kawaii-blue rounded-2xl font-bold text-kawaii-text shadow-md active:scale-95 transition disabled:bg-gray-200">
                            確定加入清單 ✨
                        </button>
                    </div>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 right-0 p-4 pb-8 bg-white/90 border-t border-gray-100 max-w-md mx-auto shadow-lg backdrop-blur-md">
                <button @click="handleSync" :disabled="pendingCount === 0 || saving"
                    :class="['w-full py-4 rounded-2xl font-bold text-white shadow-md transition', 
                            pendingCount === 0 ? 'bg-gray-300' : 'bg-kawaii-pink active:scale-95']">
                    {{ saving ? '同步中...' : `儲存改動 (x${pendingCount}) ✨` }}
                </button>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        // ⚠️ 請填入你的資訊
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxP6Au0rO-gKhlh2hscTf9CCoNLJWC-ZY3zmtX4JlXzQbi5tVA5Uwk6JDn7lYy4d6P2/exec";
        const CLD_CLOUD_NAME = "disr3dmsj";
        const CLD_PRESET = "uploadurls";

        createApp({
            setup() {
                const stores = ref([]);
                const allItems = ref([]);
                const selectedStoreId = ref(null);
                const filter = ref('All');
                const pendingChanges = ref({});
                const loading = ref(true);
                const saving = ref(false);

                // 新增商品相關
                const showAddModal = ref(false);
                const isUploading = ref(false);
                const uploadStatus = ref('未選擇圖片');
                const newItem = ref({ itemName: '', storeId: '', imageUrl: '' });

                const fetchData = async () => {
                    try {
                        const res = await fetch(GAS_URL);
                        const data = await res.json();
                        stores.value = data.stores;
                        allItems.value = data.items.map(item => ({
                            ...item,
                            isChecked: String(item.isChecked).toUpperCase() === 'TRUE'
                        }));
                        if (stores.value.length > 0) {
                            selectedStoreId.value = stores.value[0].storeId;
                            newItem.value.storeId = stores.value[0].storeId;
                        }
                    } catch (e) { console.error(e); }
                    loading.value = false;
                };

                // 上傳到 Cloudinary
                const uploadToCloudinary = async (event) => {
                    const file = event.target.files[0];
                    if (!file) return;

                    isUploading.value = true;
                    uploadStatus.value = '正在上傳到 Cloud...';
                    
                    const fd = new FormData();
                    fd.append('file', file);
                    fd.append('upload_preset', CLD_PRESET);
                    fd.append('folder', 'fukuoka-trip');

                    try {
                        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD_NAME}/image/upload`, {
                            method: 'POST',
                            body: fd
                        });
                        const data = await res.json();
                        newItem.value.imageUrl = data.secure_url;
                        uploadStatus.value = '✅ 上傳成功';
                    } catch (e) {
                        uploadStatus.value = '❌ 上傳失敗';
                        alert('上傳圖片失敗');
                    } finally {
                        isUploading.value = false;
                    }
                };

                // 將新商品寫入 Google Sheet (需要在 GAS 新增一區處理)
                const addNewItemToSheet = async () => {
                    saving.value = true;
                    const payload = {
                        action: 'addItem', // 用 action 來區分是「更新狀態」還是「新增商品」
                        ...newItem.value,
                        itemId: Date.now().toString() // 簡單用時間做 ID
                    };

                    try {
                        // 註：你原本的 GAS doPost 可能要微調來支援新增
                        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                        alert("已提交新增請求！請重新整理。");
                        showAddModal.value = false;
                        newItem.value = { itemName: '', storeId: selectedStoreId.value, imageUrl: '' };
                    } catch (e) { alert("新增失敗"); }
                    saving.value = false;
                };

                const currentStore = computed(() => stores.value.find(s => s.storeId === selectedStoreId.value));
                const filteredItems = computed(() => {
                    return allItems.value.filter(item => {
                        if (item.storeId !== selectedStoreId.value) return false;
                        if (filter.value === 'To Buy') return !item.isChecked;
                        if (filter.value === 'Done') return item.isChecked;
                        return true;
                    });
                });

                const addPending = (item) => { pendingChanges.value[item.itemId] = item.isChecked; };
                const pendingCount = computed(() => Object.keys(pendingChanges.value).length);

                const handleSync = async () => {
                    saving.value = true;
                    const payload = Object.keys(pendingChanges.value).map(id => ({ itemId: id, isChecked: pendingChanges.value[id] }));
                    try {
                        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                        alert("同步成功！");
                        pendingChanges.value = {};
                    } catch (e) { alert("儲存失敗"); }
                    saving.value = false;
                };

                onMounted(fetchData);

                return { stores, allItems, selectedStoreId, filter, loading, saving, currentStore, filteredItems, addPending, pendingCount, handleSync, showAddModal, newItem, uploadToCloudinary, isUploading, uploadStatus, addNewItemToSheet };
            }
        }).mount('#app');
    </script>
</body>
</html>
